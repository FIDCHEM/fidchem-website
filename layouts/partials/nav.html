<nav class="site-nav" id="site-nav">
  <a class="nav-logo" href="{{ "/" | relLangURL }}">
    <img src="{{ "img/logo.png" | relURL }}" alt="FIDCHEM" class="nav-logo-img">
    <span class="nav-logo-text">FID<em>CHEM</em></span>
  </a>

  <button class="nav-burger" id="nav-burger" aria-label="Menu">
    <span></span><span></span><span></span>
  </button>

  <ul class="nav-links" id="nav-links">
    {{ range .Site.Menus.main }}
    <li><a href="{{ .URL }}">{{ .Name }}</a></li>
    {{ end }}
    <li><a href="#consultant" class="nav-cta">{{ if eq .Site.Language.Lang "es" }}Consulta →{{ else }}Get a Quote →{{ end }}</a></li>
  </ul>

  <!-- Language switcher -->
  <div class="lang-switch">
    {{ range .Site.Languages }}
    <a href="{{ "/" | relLangURL }}" class="{{ if eq . $.Site.Language }}active{{ end }}">{{ .LanguageName | upper | truncate 2 "" }}</a>
    {{ end }}
  </div>
</nav>
